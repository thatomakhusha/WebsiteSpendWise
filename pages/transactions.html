<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>SpendWise | Transactions</title>

        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
        <link href="../assets/dashboard.css" rel="stylesheet">
    </head>

    <body>
        <nav class="site-nav">
            <button class="sidebar-toggle">
                    <span class="material-symbols-rounded">
                        menu
                    </span>
            </button>
        </nav>
        <div class="container">
            <aside class="sidebar collapsed">
                <!--Sidebar header-->
                <header class="sidebar-header">
                    <div class="sidebar-brand">
                        <span class="material-symbols-rounded" style="color:#1a7a3a;font-size:1.6rem">savings</span>
                        <span class="brand-text">SpendWise</span>
                    </div>
                    <button class="sidebar-toggle">
                        <span class="material-symbols-rounded">
                            chevron_left
                        </span>
                    </button>
                </header>

                <div class="sidebar-content">
                    <!--search form-->
                    <form action="#" class="search-form">
                        <span class="material-symbols-rounded">
                            search
                        </span>
                        <input type="search" placeholder="Search..." required>
                    </form>
                    <!--Menu list-->
                    <ul class="menu-list">
                        <li class="menu-item">
                            <a href="dashboard.html" class="menu-link">
                                <span class="material-symbols-rounded">dashboard</span>
                                <span class="menu-label">Dashboard</span>
                            </a>
                        </li>
                        <li class="menu-item">
                            <a href="transactions.html" class="menu-link active">
                                <span class="material-symbols-rounded">receipt_long</span>
                                <span class="menu-label">Transactions</span>
                            </a>
                        </li>
                        <li class="menu-item">
                            <a href="goals.html" class="menu-link">
                                <span class="material-symbols-rounded">savings</span>
                                <span class="menu-label">Goals</span>
                            </a>
                        </li>
                        <li class="menu-item">
                            <a href="budgets.html" class="menu-link">
                                <span class="material-symbols-rounded">account_balance_wallet</span>
                                <span class="menu-label">Budgets</span>
                            </a>
                        </li>
                        <li class="menu-item">
                            <a href="analytics.html" class="menu-link">
                                <span class="material-symbols-rounded">analytics</span>
                                <span class="menu-label">Analytics</span>
                            </a>
                        </li>
                        <li class="menu-item">
                            <a href="settings.html" class="menu-link">
                                <span class="material-symbols-rounded">settings</span>
                                <span class="menu-label">Settings</span>
                            </a>
                        </li>
                    </ul>
                </div>

                <!--Siderbar footer-->
                <div class="sidebar-footer">
                    <button id="logoutBtn" class="logout-btn">
                        <span class="material-symbols-rounded">logout</span>
                        <span class="logout-text">Logout</span>
                    </button>
                    <button class="theme-toggle">
                        <div class="theme-label">
                            <span class="theme-icon material-symbols-rounded">dark_mode</span>
                            <span class="theme-text">Dark Mode</span>
                        </div>
                        <div class="theme-toggle-track">
                            <div class="theme-toggle-indicator">

                            </div>
                        </div>
                    </button>
                </div>
            </aside>
            
            <div class="main-content">
                <!--Header-->
                <header class="topbar">
                    <div class="topbar-row topbar-row-1">
                        <div class="topbar-welcome">
                            <h1>Transactions</h1>
                            <p>Manage all your income and expenses</p>
                        </div>

                        <div class="topbar-actions">
                            <button id="notifications">
                                <span class="material-symbols-rounded">notifications</span>
                            </button>
                            <button id="profileBtn" onclick="window.location.href='settings.html'">
                                <span class="material-symbols-rounded">account_circle</span>
                            </button>
                        </div>
                    </div>
                    
                    
                    
                </header>
                <!-- FILTER BAR -->
                <section class="transaction-filters">
                    <button id="openTransactionFormBtn" class="add-primary-btn">
                        <span class="material-symbols-rounded" style="font-size:1rem">add</span>
                        Add transaction
                    </button>
                    <select id="typeFilter">
                        <option value="all">All</option>
                        <option value="income">Income</option>
                        <option value="expense">Expense</option>
                    </select>

                    <select id="categoryFilter">
                        <option value="all">All Categories</option>
                    </select>

                    <input type="month" id="monthFilter"/>

                    <button id="resetFiltersBtn">Reset</button>

                </section>


                <!-- TRANSACTION FORM (hidden by default) -->
                <section id="transactionFormContainer" class="hidden">

                    <h2 id="formTitle">Add Transaction</h2>

                    <form id="transactionForm">

                        
                        <input type="hidden" id="transactionId"/>

                        <label for="transactionType">Type</label>
                        <select id="transactionType" required>
                        <option value="expense">Expense</option>
                        <option value="income">Income</option>
                        </select>

                        <label for="amount">Amount</label>
                        <input type="number" id="amount" placeholder="Amount" required />

                        <label for="description">Description</label>
                        <input type="text" id="description" placeholder="Description" required />

                        <label for="category">Category</label>
                        <select id="category" required>
                        <option value="">Select Category</option>
                        </select>

                        <label for="date">Date</label>
                        <input type="date" id="date" required />

                        <button type="button" onclick="addTransaction()">Save</button>
                        <button type="button" id="cancelFormBtn">Cancel</button>
                        

                    </form>

                </section>


                <!-- TRANSACTIONS LIST -->
                <section class="transaction-list-section">

                    <div id="transactionsList">
                        <!-- JS will render items here -->
                    </div>

                </section>
            </div>
        </div>
        <script type="module" src="../components/sidebar.js" defer></script>
        <script type="module" src="transactions.js" defer></script>
    </body>
</html>
