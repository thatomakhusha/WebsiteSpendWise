<html>
    <head>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
        <link href="dashboard.css" rel="stylesheet">
    </head>
    <body>
        <nav class="site-nav">
            <button class="sidebar-toggle">
                    <span class="material-symbols-rounded">
                        menu
                    </span>
            </button>
        </nav>
        <div class="container">
            <aside class="sidebar collapsed">
                <!--Sidebar header-->
                <header class="sidebar-header">
                    <img src="Logo maker project-Photoroom.png" alt ="" class="header-logo">
                    <button class="sidebar-toggle">
                        <span class="material-symbols-rounded">
                            chevron_left
                        </span>
                    </button>
                </header>

                <div class="sidebar-content">
                    <!--search form-->
                    <form action="#" class="search-form">
                        <span class="material-symbols-rounded">
                            search
                        </span>
                        <input type="search" placeholder="Search..." required>
                    </form>
                    <!--Menu list-->
                    <ul class="menu-list">
                        <li class="menu-item">
                            <a href="#" class="menu-link active">
                                <span class="material-symbols-rounded">dashboard</span>
                                <span class="menu-label">Dashboard</span>
                            </a>
                        </li>
                        <li class="menu-item">
                            <a href="#" class="menu-link ">
                                <span class="material-symbols-rounded">receipt_long</span>
                                <span class="menu-label">Transactions</span>
                            </a>
                        </li>
                        <li class="menu-item">
                            <a href="#" class="menu-link">
                                <span class="material-symbols-rounded">analytics</span>
                                <span class="menu-label">Analytics</span>
                            </a>
                        </li>
                        <li class="menu-item">
                            <a href="#" class="menu-link">
                                <span class="material-symbols-rounded">account_balance_wallet</span>
                                <span class="menu-label">Budgets</span>
                            </a>
                        </li>
                        <li class="menu-item">
                            <a href="#" class="menu-link">
                                <span class="material-symbols-rounded">settings</span>
                                <span class="menu-label">Settings</span>
                            </a>
                        </li>
                    </ul>
                </div>

                <!--Siderbar footer-->
                <div class="sidebar-footer">
                    <button class="theme-toggle">
                        <div class="theme-label">
                            <span class="theme-icon material-symbols-rounded">dark_mode</span>
                            <span class="theme-text">Dark Mode</span>
                        </div>
                        <div class="theme-toggle-track">
                            <div class="theme-toggle-indicator">

                            </div>
                        </div>
                    </button>
                </div>
            </aside>
            <div class="main-content">
                <header class="topbar">
                    <div class="topbar-row topbar-row-1">
                        <div class="topbar-welcome">
                            <h1>Welcome, <span id="userName">User</span></h1>
                            <p>Track your finances smarter.</p>
                        </div>

                        <div class="topbar-actions">
                            <button id="notifications">
                                <span class="material-symbols-rounded">notifications</span>
                            </button>
                            <button id="profileBtn">
                                <span class="material-symbols-rounded">account_circle</span>
                            </button>

                            <div id="profileDropdown" class="dropdown hidden">
                                <p id="profileBtnNav">Profile</p>
                                <p>Settings</p>
                                <p id="logoutBtn">Logout</p>
                            </div>
                        </div>
                    </div>
                    <div class="topbar-row topbar-row-2">
                        <div class="month-selector">
                            <span class="material-symbols-rounded">calendar_month</span>
                            <input type="month" class="month-picker">
                        </div>
                        <div class="quick-month-buttons">
                            <button onclick="setQuickMonth('THIS')">This Month</button>
                            <button onclick="setQuickMonth('LAST')">Last Month</button>
                        </div>
                    </div>
                    
                </header>
            </div>
        </div>
        <script type="module" src="dashboard.js" defer></script>
    </body>
</html>
